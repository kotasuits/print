<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Scanner</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- HTML5 QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.15), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 600px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #34d399, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 500px;
        }

        /* Scanner overrides */
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--primary) !important;
        }

        #reader__dashboard_section_csr span {
            color: var(--text-main) !important;
        }

        #reader__dashboard_section_swaplink {
            color: var(--primary) !important;
        }
        
        #reader button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        /* Status Toast */
        .status-toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 1000;
        }

        .status-toast.show {
            bottom: 40px;
        }

        .status-toast.success { border-color: #10b981; color: #10b981; }
        .status-toast.error { border-color: #ef4444; color: #ef4444; }
        .status-toast.loading { border-color: #eab308; color: #eab308; }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid currentColor;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #34d399;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #10b981;
        }

        /* Setup warning */
        .setup-warning {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }

        .setup-warning a { color: white; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dispatch Scanner</h1>
        <p>Scan address label QR codes to save them directly to Google Sheets.</p>
    </div>

    <div class="glass-card">
        <div id="setup-warning" class="setup-warning" style="display: none;">
            <strong>Setup Required:</strong> You need to add your Google Web App URL in the scanner.html file for data saving to work.
        </div>

        <div id="reader"></div>
    </div>

    <div class="nav-links">
        <a href="qr.html">← Generate Labels</a>
        <a href="dispatched.html">View Dispatched Log →</a>
    </div>

    <div id="toast" class="status-toast">
        <div id="toast-icon"></div>
        <span id="toast-message">Ready</span>
    </div>

    <script>
        // ========================================================================
        // ⚠️ IMPORTANT: PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL BELOW ⚠️
        // ========================================================================
        const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwq6qCSjSJbk3YsTDD8pjfmROmA6ab8_GqDx1sPZIWQaOpM3dN5Vr1dwcWykOE_LklUAA/exec"; 
        // Example: "https://script.google.com/macros/s/AKfycbx.../exec"

        
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: {width: 250, height: 250},
            aspectRatio: 1.0
        }, false);
        
        let isProcessing = false;

        window.onload = function() {
            if (!GOOGLE_WEB_APP_URL || GOOGLE_WEB_APP_URL.trim() === "") {
                document.getElementById('setup-warning').style.display = 'block';
            }
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function showToast(type, message) {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-message');

            toast.className = `status-toast show ${type}`;
            msg.innerText = message;

            if (type === 'loading') {
                icon.innerHTML = '<div class="loader"></div>';
            } else if (type === 'success') {
                icon.innerHTML = '✅';
            } else {
                icon.innerHTML = '❌';
            }

            if (type !== 'loading') {
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return; // Prevent multiple scans at once

            // Try parsing the text as JSON
            let parsedData;
            try {
                parsedData = JSON.parse(decodedText);
                if (!parsedData.name && !parsedData.phone) {
                    throw new Error("Invalid format");
                }
            } catch (e) {
                // If it's not our JSON format, still allow saving but as raw data
                parsedData = { rawText: decodedText };
            }

            isProcessing = true;
            html5QrcodeScanner.pause(true); // Pause scanning visually
            showToast('loading', 'Saving to Google Sheets...');

            // If user hasn't set the URL yet, simulate success for testing
            if (!GOOGLE_WEB_APP_URL || GOOGLE_WEB_APP_URL.trim() === "") {
                setTimeout(() => {
                    showToast('error', 'Google Web App URL not configured!');
                    setTimeout(() => {
                        html5QrcodeScanner.resume();
                        isProcessing = false;
                    }, 2000);
                }, 1000);
                return;
            }

            // Prepare data for standard form POST submission
            const formData = new URLSearchParams();
            formData.append("data", JSON.stringify(parsedData));

            fetch(GOOGLE_WEB_APP_URL, {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    showToast('success', 'Successfully Dispatched!');
                } else {
                    showToast('error', 'Error: ' + data.message);
                }
            })
            .catch(error => {
                console.error("Error:", error);
                showToast('error', 'Network error. Try again.');
            })
            .finally(() => {
                // Resume scanning after a delay to prevent accidental double scans
                setTimeout(() => {
                    html5QrcodeScanner.resume();
                    isProcessing = false;
                }, 2000);
            });
        }

        function onScanFailure(error) {
            // handle scan failure, usually better to ignore and keep scanning
            // console.warn(`Code scan error = ${error}`);
        }
    </script>
</body>
</html>
