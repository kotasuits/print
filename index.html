<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Custom PDF Maker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 30px;
      background: #f5f5f5;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #444;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 25px;
    }

    button,
    select {
      padding: 10px 16px;
      font-size: 15px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .textarea-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .textarea-box {
      width: 30%;
      background: transparent;
      border-radius: 10px;
      padding: 10px;
      position: relative;
    }

    .editable {
      width: 100%;
      min-height: 100px;
      max-height: 300px;
      overflow-y: auto;
      word-wrap: break-word;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-size: 16px;
      font-family: inherit;
      box-sizing: border-box;
      resize: vertical;
      outline: none;
      background: white;
      text-align: left;
    }

    .lock-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      background: #dc3545;
      color: white;
      border: none;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .qty-input {
      position: absolute;
      top: 8px;
      right: 60px;
      width: 40px;
      padding: 3px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-align: center;
    }

    .kdo-label {
      position: absolute;
      top: 8px;
      left: 10px;
      font-family: 'Dancing Script', cursive;
      font-size: 16px;
      background: transparent;
      color: #333;
      border: none;
      cursor: pointer;
    }

    .locked .editable {
      background: #eee;
    }
  </style>
</head>

<body>

  <h1>Custom PDF & Print Maker</h1>

  <div class="controls">
    <button onclick="addAddressBox()">Add Box</button>

    <select id="fontFamily" onchange="adjustFontFamily()">
      <option value="Arial">Arial</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Segoe UI" selected>Segoe UI</option>
      <option value="Roboto">Roboto</option>
      <option value="Courier New">Courier New</option>
    </select>

    <select id="pageSize">
      <option value="A4">A4</option>
      <option value="A5">A5</option>
      <option value="A6" selected>A6</option>
    </select>

    <button onclick="alignText('left')">Align Left</button>
    <button onclick="alignText('right')">Align Right</button>

    <button onclick="adjustFontSize(1)">A+</button>
    <button onclick="adjustFontSize(-1)">A–</button>

    <button onclick="applyBold()">Bold</button>
    <button onclick="generatePDF()">Download PDF</button>
    <button onclick="printAddresses()">Print</button>
  </div>

  <div id="addressContainer" class="textarea-container"></div>

  <script>
    function addAddressBox() {
      const container = document.getElementById('addressContainer');
      const box = document.createElement('div');
      box.className = 'textarea-box';
      box.innerHTML = `
      <button class="kdo-label" onclick="toggleKdo(this)">KDO</button>
      <input type="number" class="qty-input" placeholder="Qty" min="1" value="1" title="Quantity to print/PDF">
      <button class="lock-btn" onclick="toggleLock(this)">Lock</button>
      <div class="editable" contenteditable="true" style="font-size:16px;"></div>
    `;
      container.appendChild(box);
    }

    function toggleLock(btn) {
      const box = btn.parentElement;
      const editable = box.querySelector('.editable');
      if (editable.contentEditable === "false") {
        editable.contentEditable = "true";
        box.classList.remove('locked');
        btn.textContent = "Lock";
      } else {
        editable.contentEditable = "false";
        box.classList.add('locked');
        btn.textContent = "Unlock";
      }
    }

    function toggleKdo(labelBtn) {
      labelBtn.textContent = labelBtn.textContent === 'KDO' ? 'KZO' : 'KDO';
    }

    function adjustFontFamily() {
      const font = document.getElementById('fontFamily').value;
      document.querySelectorAll('.editable').forEach(div => {
        div.style.fontFamily = font;
      });
    }

    function alignText(direction) {
      document.querySelectorAll('.editable').forEach(div => {
        div.style.textAlign = direction;
      });
    }

    function applyBold() {
      document.execCommand('bold');
    }

    function adjustFontSize(change) {
      document.querySelectorAll('.editable').forEach(div => {
        const currentSize = parseInt(window.getComputedStyle(div).fontSize);
        let newSize = currentSize + change;
        if (newSize >= 16 && newSize <= 116) {
          div.style.fontSize = newSize + 'px';
        }
      });
    }

    async function generatePDF() {
      const { jsPDF } = window.jspdf;
      const pageSize = document.getElementById('pageSize').value.toLowerCase();
      const doc = new jsPDF({ format: pageSize });
      const boxes = document.querySelectorAll('.editable');

      let colWidth = 180;
      let maxHeight = 270;
      if (pageSize === 'a5') {
        colWidth = 130;
        maxHeight = 190;
      } else if (pageSize === 'a6') {
        colWidth = 90;
        maxHeight = 130;
      }

      const x = 10;
      let y = 10;

      boxes.forEach((box) => {
        const text = box.innerText.trim();
        const qtyInput = box.parentElement.querySelector('.qty-input');
        const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;

        if (text) {
          const lines = doc.splitTextToSize(text, colWidth);
          doc.text(`Qty: ${qty} pcs`, x, y);
          y += 10;
          doc.text(lines, x, y);
          y += lines.length * 10 + 10;
          if (y > maxHeight) {
            doc.addPage();
            y = 10;
          }
        }
      });

      doc.save('custom.pdf');
    }

    // Automatically sends phone numbers to the Google Sheet App Script
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXuhD4vgGu-aeLxyGqwM8vPgxpkCtHwbFH2oUULAaMnBWrBft69jPYqnR3hiwt_V33/exec";

    async function savePhoneNumbersToSheet() {
      const boxes = document.querySelectorAll('.editable');
      const phoneNumbers = new Set();

      // Regex to find 10+ digit numbers (ignoring spaces, dashes, etc.)
      const phoneRegex = /(?:\+?\d{1,3}[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}/g;

      boxes.forEach((box) => {
        const text = box.innerText;
        const matches = text.match(phoneRegex);
        if (matches) {
          matches.forEach(num => phoneNumbers.add(num.trim()));
        }
      });

      // If no phone numbers found, skip silently so printing still continues
      if (phoneNumbers.size === 0) return;

      // Load previously saved numbers from localStorage to avoid duplicates across sessions
      const savedNumbers = new Set(JSON.parse(localStorage.getItem('savedPhoneNumbers') || '[]'));

      // Only keep numbers that haven't been sent before
      const newNumbers = Array.from(phoneNumbers).filter(num => !savedNumbers.has(num));

      // Nothing new to send — all numbers already saved previously
      if (newNumbers.length === 0) return;

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ phoneNumbers: newNumbers })
        });
        // no-cors: we assume success if no network error thrown
        // Mark these numbers as saved so they won't be sent again
        newNumbers.forEach(num => savedNumbers.add(num));
        localStorage.setItem('savedPhoneNumbers', JSON.stringify(Array.from(savedNumbers)));
      } catch (error) {
        console.error("Error saving phone numbers to sheet:", error.message);
      }
    }

    async function printAddresses() {
      // Automatically save phone numbers to Google Sheet when printing
      await savePhoneNumbersToSheet();

      const boxes = document.querySelectorAll('.textarea-box');
      const fontFamily = document.getElementById('fontFamily').value;
      const pageSize = document.getElementById('pageSize').value;

      const win = window.open('', '', 'width=800,height=900');
      win.document.write(`
      <html>
      <head>
        <title>Print ${pageSize}</title>
        <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
        <style>
          @page {
            size: ${pageSize} portrait;
            margin: 10mm;
          }
          body {
            font-family: ${fontFamily};
            margin: 0;
            padding: 0;
          }
          .page {
            width: 100%;
            height: 100%;
            page-break-after: always;
            box-sizing: border-box;
            padding: 20px;
            position: relative;
          }
          .label {
            position: absolute;
            top: 5px;
            right: 10px;
            font-family: 'Dancing Script', cursive;
            font-size: 16px;
          }
          .content {
            width: 100%;
            font-size: 16px;
            word-wrap: break-word;
            padding: 10px;
            border-radius: 0;
            background: transparent;
          }
          .note {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
          }
          .qty-label {
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #555;
          }
        </style>
      </head>
      <body>
    `);

      boxes.forEach((box) => {
        const editable = box.querySelector('.editable');
        const labelBtn = box.querySelector('.kdo-label');
        const qtyInput = box.querySelector('.qty-input');

        const label = labelBtn ? labelBtn.textContent : '';
        const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;
        const content = editable.innerHTML.trim();
        const size = window.getComputedStyle(editable).fontSize;
        const align = window.getComputedStyle(editable).textAlign;

        if (content) {
          win.document.write(`
            <div class="page">
              <div class="qty-label">Qty: ${qty} pcs</div>
              <div class="label">${label}</div>
              <div class="content" style="font-size:${size}; text-align:${align}">${content}</div>
              <div class="note">⚠️Important : Unboxing video required for any claim.</div>
            </div>
          `);
        }
      });

      win.document.write(`</body></html>`);
      win.document.close();
      win.print();
    }

    // Start with one box
    addAddressBox();
  </script>
</body>

</html>
