<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Custom PDF Maker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Lato:wght@400;700&family=Montserrat:wght@400;700&family=Raleway:wght@400;700&family=Nunito:wght@400;700&family=Oswald:wght@400;700&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&family=PT+Sans:wght@400;700&family=Ubuntu:wght@400;700&family=Source+Sans+3:wght@400;700&family=Noto+Sans:wght@400;700&family=Mulish:wght@400;700&family=Quicksand:wght@400;700&family=Josefin+Sans:wght@400;700&family=Fira+Sans:wght@400;700&family=Exo+2:wght@400;700&family=Barlow:wght@400;700&family=Inter:wght@400;700&family=DM+Sans:wght@400;700&family=Work+Sans:wght@400;700&family=Cabin:wght@400;700&family=Karla:wght@400;700&family=Rubik:wght@400;700&family=Jost:wght@400;700&family=Outfit:wght@400;700&family=Manrope:wght@400;700&family=Pacifico&family=Lobster&family=Comfortaa:wght@400;700&family=Righteous&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 30px;
      background: #f5f5f5;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #444;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 25px;
    }

    button,
    select {
      padding: 10px 16px;
      font-size: 15px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .textarea-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .textarea-box {
      width: 30%;
      background: transparent;
      border-radius: 10px;
      padding: 10px;
      position: relative;
    }

    .editable {
      width: 100%;
      min-height: 100px;
      max-height: 300px;
      overflow-y: auto;
      word-wrap: break-word;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-size: 16px;
      font-family: inherit;
      box-sizing: border-box;
      resize: vertical;
      outline: none;
      background: white;
      text-align: left;
    }

    .lock-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      background: #dc3545;
      color: white;
      border: none;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .qty-input {
      position: absolute;
      top: 8px;
      right: 60px;
      width: 40px;
      padding: 3px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-align: center;
    }

    .kdo-label {
      position: absolute;
      top: 8px;
      left: 10px;
      font-family: 'Dancing Script', cursive;
      font-size: 16px;
      background: transparent;
      color: #333;
      border: none;
      cursor: pointer;
    }

    .locked .editable {
      background: #eee;
    }
  </style>
</head>

<body>

  <h1>Custom PDF & Print Maker</h1>

  <div class="controls">
    <button onclick="addAddressBox()">Add Box</button>

    <select id="fontFamily" onchange="adjustFontFamily()">
      <!-- Default -->
      <option value="Poppins" selected>Poppins ⭐</option>
      <!-- Sans-serif -->
      <option value="Roboto">Roboto</option>
      <option value="Open Sans">Open Sans</option>
      <option value="Lato">Lato</option>
      <option value="Montserrat">Montserrat</option>
      <option value="Raleway">Raleway</option>
      <option value="Nunito">Nunito</option>
      <option value="Oswald">Oswald</option>
      <option value="Inter">Inter</option>
      <option value="DM Sans">DM Sans</option>
      <option value="Work Sans">Work Sans</option>
      <option value="Barlow">Barlow</option>
      <option value="Fira Sans">Fira Sans</option>
      <option value="Exo 2">Exo 2</option>
      <option value="Cabin">Cabin</option>
      <option value="Karla">Karla</option>
      <option value="Rubik">Rubik</option>
      <option value="Jost">Jost</option>
      <option value="Outfit">Outfit</option>
      <option value="Manrope">Manrope</option>
      <option value="Mulish">Mulish</option>
      <option value="Quicksand">Quicksand</option>
      <option value="Josefin Sans">Josefin Sans</option>
      <option value="Ubuntu">Ubuntu</option>
      <option value="PT Sans">PT Sans</option>
      <option value="Source Sans 3">Source Sans 3</option>
      <option value="Noto Sans">Noto Sans</option>
      <!-- Serif -->
      <option value="Merriweather">Merriweather</option>
      <option value="Playfair Display">Playfair Display</option>
      <!-- Display / Decorative -->
      <option value="Pacifico">Pacifico</option>
      <option value="Lobster">Lobster</option>
      <option value="Comfortaa">Comfortaa</option>
      <option value="Righteous">Righteous</option>
      <option value="Caveat">Caveat</option>
      <option value="Dancing Script">Dancing Script</option>
      <!-- System -->
      <option value="Arial">Arial</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Courier New">Courier New</option>
      <option value="Segoe UI">Segoe UI</option>
    </select>

    <select id="pageSize">
      <option value="A4">A4</option>
      <option value="A5">A5</option>
      <option value="A6" selected>A6</option>
    </select>

    <button onclick="alignText('left')">Align Left</button>
    <button onclick="alignText('right')">Align Right</button>

    <button onclick="adjustFontSize(1)">A+</button>
    <button onclick="adjustFontSize(-1)">A–</button>

    <button onclick="applyBold()">Bold</button>
    <button onclick="generatePDF()">Download PDF</button>
    <button onclick="printAddresses()">Print</button>
  </div>

  <div id="addressContainer" class="textarea-container"></div>

  <script>
    function addAddressBox() {
      const container = document.getElementById('addressContainer');
      const box = document.createElement('div');
      box.className = 'textarea-box';
      box.innerHTML = `
      <button class="kdo-label" onclick="toggleKdo(this)">KDO</button>
      <input type="number" class="qty-input" placeholder="Qty" min="1" value="1" title="Quantity to print/PDF">
      <button class="lock-btn" onclick="toggleLock(this)">Lock</button>
      <div class="editable" contenteditable="true" style="font-size:16px;"></div>
    `;
      container.appendChild(box);
    }

    function toggleLock(btn) {
      const box = btn.parentElement;
      const editable = box.querySelector('.editable');
      if (editable.contentEditable === "false") {
        editable.contentEditable = "true";
        box.classList.remove('locked');
        btn.textContent = "Lock";
      } else {
        editable.contentEditable = "false";
        box.classList.add('locked');
        btn.textContent = "Unlock";
      }
    }

    function toggleKdo(labelBtn) {
      labelBtn.textContent = labelBtn.textContent === 'KDO' ? 'KZO' : 'KDO';
    }

    function adjustFontFamily() {
      const font = document.getElementById('fontFamily').value;
      document.querySelectorAll('.editable').forEach(div => {
        div.style.fontFamily = font;
      });
    }

    function alignText(direction) {
      document.querySelectorAll('.editable').forEach(div => {
        div.style.textAlign = direction;
      });
    }

    function applyBold() {
      document.execCommand('bold');
    }

    function adjustFontSize(change) {
      document.querySelectorAll('.editable').forEach(div => {
        const currentSize = parseInt(window.getComputedStyle(div).fontSize);
        let newSize = currentSize + change;
        if (newSize >= 16 && newSize <= 116) {
          div.style.fontSize = newSize + 'px';
        }
      });
    }

    async function generatePDF() {
      const { jsPDF } = window.jspdf;
      const pageSize = document.getElementById('pageSize').value.toLowerCase();
      const doc = new jsPDF({ format: pageSize });
      const boxes = document.querySelectorAll('.editable');

      let colWidth = 180;
      let maxHeight = 270;
      if (pageSize === 'a5') {
        colWidth = 130;
        maxHeight = 190;
      } else if (pageSize === 'a6') {
        colWidth = 90;
        maxHeight = 130;
      }

      const x = 10;
      let y = 10;

      boxes.forEach((box) => {
        const text = box.innerText.trim();
        const qtyInput = box.parentElement.querySelector('.qty-input');
        const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;

        if (text) {
          const lines = doc.splitTextToSize(text, colWidth);
          if (qty > 1) {
            doc.text(`Qty: ${qty} pcs`, x, y);
            y += 10;
          }
          doc.text(lines, x, y);
          y += lines.length * 10 + 10;
          if (y > maxHeight) {
            doc.addPage();
            y = 10;
          }
        }
      });

      doc.save('custom.pdf');
    }


    function printAddresses() {

      const boxes = document.querySelectorAll('.textarea-box');
      const fontFamily = document.getElementById('fontFamily').value;
      const pageSize = document.getElementById('pageSize').value;

      const win = window.open('', '', 'width=800,height=900');
      win.document.write(`
      <html>
      <head>
        <title>Print ${pageSize}</title>
        <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
        <style>
          @page {
            size: ${pageSize} portrait;
            margin: 10mm;
          }
          body {
            font-family: ${fontFamily};
            margin: 0;
            padding: 0;
          }
          .page {
            width: 100%;
            height: 100%;
            page-break-after: always;
            box-sizing: border-box;
            padding: 20px;
            position: relative;
          }
          .label {
            position: absolute;
            top: 5px;
            right: 10px;
            font-family: 'Dancing Script', cursive;
            font-size: 16px;
          }
          .content {
            width: 100%;
            font-size: 16px;
            word-wrap: break-word;
            padding: 10px;
            border-radius: 0;
            background: transparent;
          }
          .note {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
          }
          .qty-label {
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #555;
          }
        </style>
      </head>
      <body>
    `);

      boxes.forEach((box) => {
        const editable = box.querySelector('.editable');
        const labelBtn = box.querySelector('.kdo-label');
        const qtyInput = box.querySelector('.qty-input');

        const label = labelBtn ? labelBtn.textContent : '';
        const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;
        const content = editable.innerHTML.trim();
        const size = window.getComputedStyle(editable).fontSize;
        const align = window.getComputedStyle(editable).textAlign;

        if (content) {
          win.document.write(`
            <div class="page">
              ${qty > 1 ? `<div class="qty-label">Qty: ${qty} pcs</div>` : ''}
              <div class="label">${label}</div>
              <div class="content" style="font-size:${size}; text-align:${align}">${content}</div>
              <div class="note">⚠️Important : Unboxing video required for any claim.</div>
            </div>
          `);
        }
      });

      win.document.write(`</body></html>`);
      win.document.close();
      win.print();
    }

    // Start with one box
    addAddressBox();
  </script>
</body>

</html>
