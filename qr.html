<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom PDF & Print Maker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Dancing+Script&family=Poppins:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Lato:wght@400;700&family=Montserrat:wght@400;700&family=Raleway:wght@400;700&family=Nunito:wght@400;700&family=Inter:wght@400;700&family=Rubik:wght@400;700&family=Josefin+Sans:wght@400;700&family=Quicksand:wght@400;700&family=Comfortaa:wght@400;700&family=Caveat:wght@400;700&family=Pacifico&family=Lobster&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --card: rgba(255,255,255,0.05);
      --card-hover: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.1);
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --green: #10b981;
      --red: #ef4444;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(59,130,246,0.18), transparent),
        radial-gradient(ellipse 60% 50% at 80% 110%, rgba(139,92,246,0.18), transparent);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 20px 60px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 28px;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    header p {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 6px;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    nav a {
      text-decoration: none;
      color: #93c5fd;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 9px 20px;
      border: 1px solid rgba(59,130,246,0.4);
      border-radius: 50px;
      background: rgba(59,130,246,0.1);
      backdrop-filter: blur(10px);
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    nav a:hover {
      background: rgba(59,130,246,0.3);
      border-color: rgba(59,130,246,0.7);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59,130,246,0.25);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      justify-content: center;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .toolbar-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .divider {
      width: 1px;
      height: 32px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.22s;
      white-space: nowrap;
    }
    .btn-default {
      background: rgba(59,130,246,0.15);
      color: #93c5fd;
      border-color: rgba(59,130,246,0.35);
    }
    .btn-default:hover {
      background: rgba(59,130,246,0.3);
      border-color: rgba(59,130,246,0.65);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(59,130,246,0.2);
    }
    .btn-success {
      background: rgba(16,185,129,0.15);
      color: #6ee7b7;
      border-color: rgba(16,185,129,0.35);
    }
    .btn-success:hover {
      background: rgba(16,185,129,0.3);
      border-color: rgba(16,185,129,0.65);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(16,185,129,0.2);
    }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
    }
    .btn-primary:hover {
      opacity: 0.88;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59,130,246,0.4);
    }
    .btn-add {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }
    .btn-add:hover {
      opacity: 0.88;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    }

    select {
      padding: 9px 14px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      background: rgba(15,23,42,0.8);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    select:hover { border-color: rgba(59,130,246,0.5); }
    select option { background: #1e293b; }

    /* ── ADDRESS GRID ── */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .addr-box {
      width: calc(33.33% - 14px);
      min-width: 280px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 48px 18px 18px;
      position: relative;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      transition: border-color 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.35s ease both;
    }
    .addr-box:hover {
      border-color: rgba(59,130,246,0.35);
      box-shadow: 0 12px 40px rgba(59,130,246,0.12);
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* box top bar */
    .box-topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
    }
    .kdo-btn {
      font-family: 'Dancing Script', cursive;
      font-size: 17px;
      color: #c4b5fd;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .kdo-btn:hover { background: rgba(139,92,246,0.2); }

    .box-actions {
      display: flex;
      gap: 6px;
    }
    .lock-btn {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid rgba(239,68,68,0.45);
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lock-btn:hover { background: rgba(239,68,68,0.28); }
    .del-btn {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 5px;
      border: 1px solid rgba(100,116,139,0.4);
      background: rgba(100,116,139,0.1);
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
    }
    .del-btn:hover { background: rgba(239,68,68,0.25); color:#fca5a5; border-color:rgba(239,68,68,0.4); }

    .editable {
      width: 100%;
      min-height: 110px;
      max-height: 320px;
      overflow-y: auto;
      word-wrap: break-word;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      outline: none;
      background: rgba(255,255,255,0.92);
      color: #111;
      line-height: 1.6;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .editable:focus {
      border-color: rgba(59,130,246,0.7);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .editable[contenteditable="false"] {
      background: #e2e8f0;
      color: #64748b;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      width: 100%;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-state p { font-size: 1rem; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      body { padding: 16px 12px 50px; }
      .addr-box { width: 100%; }
      .divider { display: none; }
      .toolbar { gap: 8px; padding: 14px; }
      .btn { padding: 9px 12px; font-size: 13px; }
      select { font-size: 13px; padding: 8px 10px; }
    }
    @media (max-width: 480px) {
      .btn { padding: 8px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>📦 Custom PDF & Print Maker</h1>
    <p>Create, format and print shipping addresses with auto QR codes</p>
  </header>

  <nav>
    <a href="scanner.html">🔍 QR Scanner</a>
    <a href="dispatched.html">📦 Dispatched Orders</a>
  </nav>

  <div class="toolbar">
    <div class="toolbar-group">
      <button class="btn btn-add" onclick="addBox()">➕ Add Box</button>
    </div>

    <div class="divider"></div>

    <div class="toolbar-group">
      <select id="fontFamily" onchange="applyFont()">
        <option value="Poppins" selected>Poppins ⭐</option>
        <option value="Roboto">Roboto</option>
        <option value="Open Sans">Open Sans</option>
        <option value="Lato">Lato</option>
        <option value="Montserrat">Montserrat</option>
        <option value="Raleway">Raleway</option>
        <option value="Nunito">Nunito</option>
        <option value="Inter">Inter</option>
        <option value="Rubik">Rubik</option>
        <option value="Quicksand">Quicksand</option>
        <option value="Josefin Sans">Josefin Sans</option>
        <option value="Comfortaa">Comfortaa</option>
        <option value="Caveat">Caveat</option>
        <option value="Dancing Script">Dancing Script</option>
        <option value="Pacifico">Pacifico</option>
        <option value="Lobster">Lobster</option>
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
      </select>

      <select id="pageSize">
        <option value="A4">A4</option>
        <option value="A5">A5</option>
        <option value="A6" selected>A6</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="toolbar-group">
      <button class="btn btn-default" onclick="alignAll('left')" title="Align Left">⬅ Left</button>
      <button class="btn btn-default" onclick="alignAll('right')" title="Align Right">Right ➡</button>
    </div>

    <div class="divider"></div>

    <div class="toolbar-group">
      <button class="btn btn-default" onclick="changeFontSize(1)">A＋</button>
      <button class="btn btn-default" onclick="changeFontSize(-1)">A－</button>
      <button class="btn btn-default" onclick="document.execCommand('bold')"><b>Bold</b></button>
    </div>

    <div class="divider"></div>

    <div class="toolbar-group">
      <button class="btn btn-success" onclick="generatePDF()">⬇ PDF</button>
      <button class="btn btn-primary" onclick="printAddresses()">🖨 Print</button>
    </div>
  </div>

  <div id="grid" class="grid">
    <div class="empty-state" id="emptyState">
      <div class="icon">📝</div>
      <p>Click <strong>➕ Add Box</strong> to create your first address card</p>
    </div>
  </div>

  <script>
    let boxCount = 0;

    function addBox() {
      document.getElementById('emptyState')?.remove();
      const grid = document.getElementById('grid');
      const box = document.createElement('div');
      box.className = 'addr-box';
      box.id = 'box-' + (++boxCount);
      box.innerHTML = `
        <div class="box-topbar">
          <button class="kdo-btn" onclick="toggleKdo(this)">KDO</button>
          <div class="box-actions">
            <button class="lock-btn" onclick="toggleLock(this)">🔒 Lock</button>
            <button class="del-btn" onclick="removeBox(this)">✕</button>
          </div>
        </div>
        <div class="editable" contenteditable="true" style="font-size:15px; font-family:'Poppins',sans-serif;"
             placeholder="Type address here..."></div>
      `;
      grid.appendChild(box);
      box.querySelector('.editable').focus();
    }

    function removeBox(btn) {
      const box = btn.closest('.addr-box');
      box.style.opacity = '0';
      box.style.transform = 'scale(0.92)';
      box.style.transition = 'all 0.2s';
      setTimeout(() => {
        box.remove();
        if (!document.querySelector('.addr-box')) {
          const grid = document.getElementById('grid');
          grid.innerHTML = `<div class="empty-state" id="emptyState"><div class="icon">📝</div><p>Click <strong>➕ Add Box</strong> to create your first address card</p></div>`;
        }
      }, 200);
    }

    function toggleLock(btn) {
      const editable = btn.closest('.addr-box').querySelector('.editable');
      const locked = editable.contentEditable === 'false';
      editable.contentEditable = locked ? 'true' : 'false';
      btn.textContent = locked ? '🔒 Lock' : '🔓 Unlock';
    }

    function toggleKdo(btn) {
      btn.textContent = btn.textContent === 'KDO' ? 'KZO' : 'KDO';
    }

    function applyFont() {
      const font = document.getElementById('fontFamily').value;
      document.querySelectorAll('.editable').forEach(el => el.style.fontFamily = `'${font}', sans-serif`);
    }

    function alignAll(dir) {
      document.querySelectorAll('.editable').forEach(el => el.style.textAlign = dir);
    }

    function changeFontSize(delta) {
      document.querySelectorAll('.editable').forEach(el => {
        const cur = parseInt(window.getComputedStyle(el).fontSize);
        const next = cur + delta;
        if (next >= 10 && next <= 60) el.style.fontSize = next + 'px';
      });
    }

    /* ─── PRINT ─── */
    function printAddresses() {
      // 1. Open popup IMMEDIATELY (direct user gesture — avoids popup blocker)
      const win = window.open('', '_blank', 'width=860,height=940');
      if (!win) {
        alert('⚠️ Popup blocked!\n\nPlease click the popup-blocked icon in your address bar and choose "Always allow popups from this site", then click Print again.');
        return;
      }

      const fontFamily = document.getElementById('fontFamily').value;
      const pageSize   = document.getElementById('pageSize').value;
      const boxes      = document.querySelectorAll('.addr-box');

      // 2. Collect data & generate QR codes synchronously
      const pages = [];
      boxes.forEach(box => {
        const editable  = box.querySelector('.editable');
        const kdoBtn    = box.querySelector('.kdo-btn');
        const label     = kdoBtn ? kdoBtn.textContent.trim() : '';
        const content   = editable.innerHTML.trim();
        const plainText = editable.innerText.trim();
        const fontSize  = window.getComputedStyle(editable).fontSize;
        const textAlign = window.getComputedStyle(editable).textAlign;

        if (!content) return;

        const phone   = (plainText.match(/\b\d{10}\b/) || [''])[0];
        const pincode = (plainText.match(/\b\d{6}\b/)  || [''])[0];
        const name    = plainText.split('\n').find(l => l.trim()) || '';

        // QRCode.js renders canvas synchronously
        const qrDiv = document.createElement('div');
        new QRCode(qrDiv, {
          text: JSON.stringify({ name, phone, pincode, address: plainText }),
          width: 256, height: 256,
          correctLevel: QRCode.CorrectLevel.L
        });
        const canvas    = qrDiv.querySelector('canvas');
        const qrDataUrl = canvas ? canvas.toDataURL('image/png') : '';

        pages.push({ label, content, fontSize, textAlign, qrDataUrl });
      });

      if (pages.length === 0) {
        win.close();
        alert('No address content found. Please type an address in at least one box.');
        return;
      }

      // 3. Build HTML string for all pages
      const pagesHtml = pages.map(({ label, content, fontSize, textAlign, qrDataUrl }) => `
        <div class="page">
          <div class="label">${label}</div>
          <div class="body-row">
            <div class="addr-content" style="font-size:${fontSize}; text-align:${textAlign}">${content}</div>
            ${qrDataUrl ? `<div class="qr-wrap"><img src="${qrDataUrl}" width="96" height="96"></div>` : ''}
          </div>
          <div class="disclaimer"><em>⚠️ Important: Unboxing video required for any claim.</em></div>
        </div>
      `).join('');

      // 4. Write complete document and trigger print via onload
      win.document.write(`<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Print – ${pageSize}</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=${encodeURIComponent(fontFamily)}:wght@400;700&display=swap" rel="stylesheet">
  <style>
    @page { size: ${pageSize} portrait; margin: 10mm; }
    * { box-sizing: border-box; }
    body { font-family: '${fontFamily}', sans-serif; margin: 0; padding: 0; }
    .page { width: 100%; min-height: 100vh; page-break-after: always; padding: 18px; position: relative; }
    .label { position: absolute; top: 8px; right: 12px; font-family: 'Dancing Script', cursive; font-size: 15px; color: #333; }
    .body-row { display: flex; justify-content: space-between; align-items: flex-start; padding-top: 28px; gap: 10px; }
    .addr-content { flex: 1; font-size: 15px; line-height: 1.7; word-wrap: break-word; white-space: pre-wrap; }
    .qr-wrap { flex-shrink: 0; }
    .disclaimer { position: absolute; bottom: 14px; left: 0; width: 100%; text-align: center; font-size: 13px; font-weight: 600; color: #333; }
  </style>
</head>
<body>
${pagesHtml}
<script>window.onload = function(){ setTimeout(function(){ window.print(); }, 120); };<\/script>
</body>
</html>`);
      win.document.close();
    }

    /* ─── PDF ─── */
    async function generatePDF() {
      const { jsPDF } = window.jspdf;
      const pageSize = document.getElementById('pageSize').value.toLowerCase();
      const doc = new jsPDF({ format: pageSize });

      let colWidth = 180, maxH = 270, qrSz = 35, qrX = 160;
      if (pageSize === 'a5') { colWidth = 100; maxH = 190; qrSz = 30; qrX = 110; }
      if (pageSize === 'a6') { colWidth = 65;  maxH = 130; qrSz = 25; qrX = 75;  }

      const boxes = document.querySelectorAll('.editable');
      let y = 10;

      for (const box of boxes) {
        const text = box.innerText.trim();
        if (!text) continue;

        const phone   = (text.match(/\b\d{10}\b/) || [''])[0];
        const pincode = (text.match(/\b\d{6}\b/)  || [''])[0];
        const name    = text.split('\n').find(l => l.trim()) || '';

        const qrDiv = document.createElement('div');
        new QRCode(qrDiv, {
          text: JSON.stringify({ name, phone, pincode, address: text }),
          width: 512, height: 512, correctLevel: QRCode.CorrectLevel.L
        });

        await new Promise(r => setTimeout(r, 60));
        const canvas = qrDiv.querySelector('canvas');
        const qrUrl  = canvas ? canvas.toDataURL('image/png') : null;

        const lines = doc.splitTextToSize(text, colWidth);
        const blockH = Math.max(lines.length * 6, qrSz) + 15;

        if (y + blockH > maxH && y !== 10) { doc.addPage(); y = 10; }

        doc.text(lines, 10, y + 5);
        if (qrUrl) doc.addImage(qrUrl, 'PNG', qrX, y, qrSz, qrSz);
        y += blockH;
      }

      doc.save('addresses.pdf');
    }

    // Start with one box
    addBox();
  </script>
</body>
</html>
