<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom PDF Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Lato:wght@400;700&family=Montserrat:wght@400;700&family=Raleway:wght@400;700&family=Nunito:wght@400;700&family=Oswald:wght@400;700&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&family=PT+Sans:wght@400;700&family=Ubuntu:wght@400;700&family=Source+Sans+3:wght@400;700&family=Noto+Sans:wght@400;700&family=Mulish:wght@400;700&family=Quicksand:wght@400;700&family=Josefin+Sans:wght@400;700&family=Fira+Sans:wght@400;700&family=Exo+2:wght@400;700&family=Barlow:wght@400;700&family=Inter:wght@400;700&family=DM+Sans:wght@400;700&family=Work+Sans:wght@400;700&family=Cabin:wght@400;700&family=Karla:wght@400;700&family=Rubik:wght@400;700&family=Jost:wght@400;700&family=Outfit:wght@400;700&family=Manrope:wght@400;700&family=Pacifico&family=Lobster&family=Comfortaa:wght@400;700&family=Righteous&family=Caveat:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', 'Segoe UI', sans-serif;
            padding: 30px;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.15), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        button,
        select {
            padding: 10px 16px;
            font-size: 15px;
            border: none;
            background-color: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover, select:hover {
            background-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        select {
            background-color: #1e293b;
            color: white;
            outline: none;
            border: 1px solid var(--border);
        }
        
        select option {
            background-color: #1e293b;
        }

        .textarea-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .textarea-box {
            width: 30%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .editable {
            width: 100%;
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
            word-wrap: break-word;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            resize: vertical;
            outline: none;
            background: white;
            text-align: left;
            color: #111; /* Keep black for printing */
            margin-top: 15px;
        }

        .lock-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lock-btn:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        .kdo-label {
            position: absolute;
            top: 10px;
            left: 15px;
            font-family: 'Dancing Script', cursive;
            font-size: 18px;
            background: transparent;
            color: #f8fafc;
            border: none;
            cursor: pointer;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .locked .editable {
            background: #e2e8f0;
            color: #64748b;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .nav-links a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border: 2px solid rgba(59, 130, 246, 0.5);
            border-radius: 6px;
            transition: all 0.2s ease;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
        }

        .nav-links a:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        /* ===== HAMBURGER MENU ===== */
        .mobile-topbar {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .mobile-topbar span {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hamburger-btn {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            transition: all 0.2s;
            font-weight: 600;
        }

        .hamburger-btn:hover {
            background: rgba(59, 130, 246, 0.4);
            transform: none;
        }

        .mobile-menu {
            display: none;
            flex-direction: column;
            gap: 10px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideDown 0.2s ease;
        }

        .mobile-menu.open {
            display: flex;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .mobile-menu button,
        .mobile-menu select {
            width: 100%;
            font-size: 15px;
            padding: 12px 14px;
            box-sizing: border-box;
            border-radius: 8px;
        }

        .menu-section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 0 2px;
            border-bottom: 1px solid var(--border);
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            h1 {
                display: none; /* shown in topbar instead */
            }

            .nav-links {
                flex-wrap: wrap;
                gap: 10px;
            }

            .nav-links a {
                flex: 1 1 auto;
                text-align: center;
                font-size: 13px;
                padding: 8px 10px;
            }

            /* Hide desktop controls bar on mobile */
            .controls {
                display: none;
            }

            /* Show hamburger topbar */
            .mobile-topbar {
                display: flex;
            }

            .textarea-box {
                width: 100%;
                padding: 15px;
            }

            .textarea-container {
                gap: 15px;
            }

            .editable {
                min-height: 120px;
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            .mobile-topbar span {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

    <script>
        function addAddressBox() {
            const container = document.getElementById('addressContainer');
            const box = document.createElement('div');
            box.className = 'textarea-box';
            box.innerHTML = `
      <button class="kdo-label" onclick="toggleKdo(this)">KDO</button>
      <button class="lock-btn" onclick="toggleLock(this)">Lock</button>
      <div class="editable" contenteditable="true" style="font-size:16px;"></div>
    `;
            container.appendChild(box);
        }

        function toggleLock(btn) {
            const box = btn.parentElement;
            const editable = box.querySelector('.editable');
            if (editable.contentEditable === "false") {
                editable.contentEditable = "true";
                box.classList.remove('locked');
                btn.textContent = "Lock";
            } else {
                editable.contentEditable = "false";
                box.classList.add('locked');
                btn.textContent = "Unlock";
            }
        }

        function toggleKdo(labelBtn) {
            labelBtn.textContent = labelBtn.textContent === 'KDO' ? 'KZO' : 'KDO';
        }

        function adjustFontFamily() {
            const font = document.getElementById('fontFamily').value;
            document.querySelectorAll('.editable').forEach(div => {
                div.style.fontFamily = font;
            });
        }

        function alignText(direction) {
            document.querySelectorAll('.editable').forEach(div => {
                div.style.textAlign = direction;
            });
        }

        function applyBold() {
            document.execCommand('bold');
        }

        function adjustFontSize(change) {
            document.querySelectorAll('.editable').forEach(div => {
                const currentSize = parseInt(window.getComputedStyle(div).fontSize);
                let newSize = currentSize + change;
                if (newSize >= 16 && newSize <= 116) {
                    div.style.fontSize = newSize + 'px';
                }
            });
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const pageSize = document.getElementById('pageSize').value.toLowerCase();
            const doc = new jsPDF({ format: pageSize });
            const boxes = document.querySelectorAll('.editable');

            let colWidth = 180;
            let maxHeight = 270;
            let qrSize = 35;
            let qrX = 160;

            if (pageSize === 'a5') {
                colWidth = 100;
                maxHeight = 190;
                qrSize = 30;
                qrX = 110;
            } else if (pageSize === 'a6') {
                colWidth = 65;
                maxHeight = 130;
                qrSize = 25;
                qrX = 75;
            }

            const x = 10;
            let y = 10;

            for (let i = 0; i < boxes.length; i++) {
                const box = boxes[i];
                const text = box.innerText.trim();

                if (text) {
                    // Extract structured data
                    const phoneMatch = text.match(/\\b\\d{10}\\b/);
                    const pincodeMatch = text.match(/\\b\\d{6}\\b/);
                    const linesText = text.split('\\n').filter(l => l.trim() !== '');
                    const name = linesText.length > 0 ? linesText[0] : '';

                    const qrData = {
                        name: name,
                        phone: phoneMatch ? phoneMatch[0] : '',
                        pincode: pincodeMatch ? pincodeMatch[0] : '',
                        address: text
                    };

                    // Generate QR Code
                    let qrDiv = document.createElement('div');
                    new QRCode(qrDiv, {
                        text: JSON.stringify(qrData),
                        width: 512,
                        height: 512,
                        correctLevel: QRCode.CorrectLevel.L
                    });

                    // Wait slightly for QR code canvas to be rendered
                    await new Promise(r => setTimeout(r, 50));

                    let canvas = qrDiv.querySelector('canvas');
                    let qrDataUrl = canvas ? canvas.toDataURL('image/png') : null;

                    const lines = doc.splitTextToSize(text, colWidth);
                    let textHeight = lines.length * 6; // approximate text block height
                    let blockHeight = Math.max(textHeight, qrSize) + 15;

                    if (y + blockHeight > maxHeight && y !== 10) {
                        doc.addPage();
                        y = 10;
                    }

                    doc.text(lines, x, y + 5);
                    if (qrDataUrl) {
                        doc.addImage(qrDataUrl, 'PNG', qrX, y, qrSize, qrSize);
                    }

                    y += blockHeight;
                }
            }

            doc.save('custom.pdf');
        }


        function printAddresses() {
            const boxes = document.querySelectorAll('.textarea-box');
            const fontFamily = document.getElementById('fontFamily').value;
            const pageSize = document.getElementById('pageSize').value;

            // Generate all page data including QR codes first
            const pageData = [];
            boxes.forEach((box) => {
                const editable = box.querySelector('.editable');
                const labelBtn = box.querySelector('.kdo-label');

                const label = labelBtn ? labelBtn.textContent : '';
                const content = editable.innerHTML.trim();
                const plainText = editable.innerText.trim();
                const size = window.getComputedStyle(editable).fontSize;
                const align = window.getComputedStyle(editable).textAlign;

                if (content) {
                    const phoneMatch = plainText.match(/\b\d{10}\b/);
                    const pincodeMatch = plainText.match(/\b\d{6}\b/);
                    const linesText = plainText.split('\n').filter(l => l.trim() !== '');
                    const name = linesText.length > 0 ? linesText[0] : '';

                    const qrData = {
                        name: name,
                        phone: phoneMatch ? phoneMatch[0] : '',
                        pincode: pincodeMatch ? pincodeMatch[0] : '',
                        address: plainText
                    };

                    let qrDiv = document.createElement('div');
                    new QRCode(qrDiv, { text: JSON.stringify(qrData), width: 256, height: 256, correctLevel: QRCode.CorrectLevel.L });
                    let canvas = qrDiv.querySelector('canvas');
                    let qrDataUrl = canvas ? canvas.toDataURL('image/png') : '';

                    pageData.push({ label, content, size, align, qrDataUrl });
                }
            });

            if (pageData.length === 0) {
                alert('Please add at least one address before printing.');
                return;
            }

            // Build the pages HTML string
            const pagesHtml = pageData.map(({ label, content, size, align, qrDataUrl }) => `
                <div class="print-page">
                  <div class="print-label">${label}</div>
                  <div class="print-body-row">
                    <div class="print-content" style="font-size:${size}; text-align:${align}">${content}</div>
                    ${qrDataUrl ? `<div class="print-qr"><img src="${qrDataUrl}" width="100" height="100"/></div>` : ''}
                  </div>
                  <div class="print-note"><em>⚠️Important : Unboxing video required for any claim.</em></div>
                </div>`).join('');

            const printStyles = `
                @page { size: ${pageSize} portrait; margin: 10mm; }
                body { font-family: ${fontFamily}; margin: 0; padding: 0; }
                .print-page {
                    width: 100%; min-height: 96vh;
                    page-break-after: always;
                    box-sizing: border-box;
                    padding: 20px;
                    position: relative;
                }
                .print-label {
                    position: absolute; top: 5px; right: 10px;
                    font-family: 'Dancing Script', cursive; font-size: 16px;
                }
                .print-body-row {
                    display: flex; justify-content: space-between;
                    align-items: flex-start; padding-top: 30px;
                }
                .print-content {
                    flex: 1; word-wrap: break-word; padding: 10px;
                    background: transparent;
                }
                .print-qr { margin-left: 15px; flex-shrink: 0; }
                .print-note {
                    position: absolute; bottom: 20px; left: 0;
                    width: 100%; text-align: center;
                    font-size: 16px; font-weight: bold;
                }`;

            // Try popup first (desktop) — mobile browsers block it
            const win = window.open('', '', 'width=800,height=900');

            if (win && !win.closed) {
                // Desktop: use popup window
                win.document.write(`<!DOCTYPE html><html><head>
                    <title>Print ${pageSize}</title>
                    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
                    <style>${printStyles}</style>
                </head><body>${pagesHtml}</body></html>`);
                win.document.close();
                win.print();
            } else {
                // Mobile fallback: inject into current page and print directly
                let styleTag = document.getElementById('mobile-print-style');
                if (!styleTag) {
                    styleTag = document.createElement('style');
                    styleTag.id = 'mobile-print-style';
                    document.head.appendChild(styleTag);
                }
                styleTag.textContent = `
                    @media print {
                        body > *:not(#mobile-print-container) { display: none !important; }
                        #mobile-print-container { display: block !important; }
                    }
                    #mobile-print-container { display: none; }
                    ${printStyles}`;

                let container = document.getElementById('mobile-print-container');
                if (!container) {
                    container = document.createElement('div');
                    container.id = 'mobile-print-container';
                    document.body.appendChild(container);
                }
                container.innerHTML = pagesHtml;

                setTimeout(() => {
                    window.print();
                    // Clean up after print dialog closes
                    setTimeout(() => { container.innerHTML = ''; }, 1000);
                }, 300);
            }
        }

        // Start with one box
        addAddressBox();

        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const btn = document.getElementById('hamburger-btn');
            const isOpen = menu.classList.toggle('open');
            btn.textContent = isOpen ? '✕' : '☰';
        }

        function closeMenu() {
            const menu = document.getElementById('mobile-menu');
            const btn = document.getElementById('hamburger-btn');
            menu.classList.remove('open');
            btn.textContent = '☰';
        }
    </script>
</body>

</html>
