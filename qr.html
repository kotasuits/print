<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Custom PDF Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Poppins:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Lato:wght@400;700&family=Montserrat:wght@400;700&family=Raleway:wght@400;700&family=Nunito:wght@400;700&family=Oswald:wght@400;700&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&family=PT+Sans:wght@400;700&family=Ubuntu:wght@400;700&family=Source+Sans+3:wght@400;700&family=Noto+Sans:wght@400;700&family=Mulish:wght@400;700&family=Quicksand:wght@400;700&family=Josefin+Sans:wght@400;700&family=Fira+Sans:wght@400;700&family=Exo+2:wght@400;700&family=Barlow:wght@400;700&family=Inter:wght@400;700&family=DM+Sans:wght@400;700&family=Work+Sans:wght@400;700&family=Cabin:wght@400;700&family=Karla:wght@400;700&family=Rubik:wght@400;700&family=Jost:wght@400;700&family=Outfit:wght@400;700&family=Manrope:wght@400;700&family=Pacifico&family=Lobster&family=Comfortaa:wght@400;700&family=Righteous&family=Caveat:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', 'Segoe UI', sans-serif;
            padding: 30px;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(139, 92, 246, 0.15), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        button,
        select {
            padding: 10px 16px;
            font-size: 15px;
            border: none;
            background-color: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover, select:hover {
            background-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        select {
            background-color: #1e293b;
            color: white;
            outline: none;
            border: 1px solid var(--border);
        }
        
        select option {
            background-color: #1e293b;
        }

        .textarea-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .textarea-box {
            width: 30%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .editable {
            width: 100%;
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
            word-wrap: break-word;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            resize: vertical;
            outline: none;
            background: white;
            text-align: left;
            color: #111; /* Keep black for printing */
            margin-top: 15px;
        }

        .lock-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lock-btn:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        .kdo-label {
            position: absolute;
            top: 10px;
            left: 15px;
            font-family: 'Dancing Script', cursive;
            font-size: 18px;
            background: transparent;
            color: #f8fafc;
            border: none;
            cursor: pointer;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .locked .editable {
            background: #e2e8f0;
            color: #64748b;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .nav-links a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border: 2px solid rgba(59, 130, 246, 0.5);
            border-radius: 6px;
            transition: all 0.2s ease;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
        }

        .nav-links a:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
    </style>
</head>

<body>

    <h1>Custom PDF & Print Maker</h1>

    <div class="nav-links">
        <a href="scanner.html">🔍 Open QR Scanner</a>
        <a href="dispatched.html">📦 View Dispatched Orders</a>
    </div>

    <div class="controls">
        <button onclick="addAddressBox()">Add Box</button>

        <select id="fontFamily" onchange="adjustFontFamily()">
            <!-- Default -->
            <option value="Poppins" selected>Poppins ⭐</option>
            <!-- Sans-serif -->
            <option value="Roboto">Roboto</option>
            <option value="Open Sans">Open Sans</option>
            <option value="Lato">Lato</option>
            <option value="Montserrat">Montserrat</option>
            <option value="Raleway">Raleway</option>
            <option value="Nunito">Nunito</option>
            <option value="Oswald">Oswald</option>
            <option value="Inter">Inter</option>
            <option value="DM Sans">DM Sans</option>
            <option value="Work Sans">Work Sans</option>
            <option value="Barlow">Barlow</option>
            <option value="Fira Sans">Fira Sans</option>
            <option value="Exo 2">Exo 2</option>
            <option value="Cabin">Cabin</option>
            <option value="Karla">Karla</option>
            <option value="Rubik">Rubik</option>
            <option value="Jost">Jost</option>
            <option value="Outfit">Outfit</option>
            <option value="Manrope">Manrope</option>
            <option value="Mulish">Mulish</option>
            <option value="Quicksand">Quicksand</option>
            <option value="Josefin Sans">Josefin Sans</option>
            <option value="Ubuntu">Ubuntu</option>
            <option value="PT Sans">PT Sans</option>
            <option value="Source Sans 3">Source Sans 3</option>
            <option value="Noto Sans">Noto Sans</option>
            <!-- Serif -->
            <option value="Merriweather">Merriweather</option>
            <option value="Playfair Display">Playfair Display</option>
            <!-- Display / Decorative -->
            <option value="Pacifico">Pacifico</option>
            <option value="Lobster">Lobster</option>
            <option value="Comfortaa">Comfortaa</option>
            <option value="Righteous">Righteous</option>
            <option value="Caveat">Caveat</option>
            <option value="Dancing Script">Dancing Script</option>
            <!-- System -->
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Segoe UI">Segoe UI</option>
        </select>

        <select id="pageSize">
            <option value="A4">A4</option>
            <option value="A5">A5</option>
            <option value="A6" selected>A6</option>
        </select>

        <button onclick="alignText('left')">Align Left</button>
        <button onclick="alignText('right')">Align Right</button>

        <button onclick="adjustFontSize(1)">A+</button>
        <button onclick="adjustFontSize(-1)">A–</button>

        <button onclick="applyBold()">Bold</button>
        <button onclick="generatePDF()">Download PDF</button>
        <button onclick="printAddresses()">Print</button>
    </div>

    <div id="addressContainer" class="textarea-container"></div>

    <script>
        function addAddressBox() {
            const container = document.getElementById('addressContainer');
            const box = document.createElement('div');
            box.className = 'textarea-box';
            box.innerHTML = `
      <button class="kdo-label" onclick="toggleKdo(this)">KDO</button>
      <button class="lock-btn" onclick="toggleLock(this)">Lock</button>
      <div class="editable" contenteditable="true" style="font-size:16px;"></div>
    `;
            container.appendChild(box);
        }

        function toggleLock(btn) {
            const box = btn.parentElement;
            const editable = box.querySelector('.editable');
            if (editable.contentEditable === "false") {
                editable.contentEditable = "true";
                box.classList.remove('locked');
                btn.textContent = "Lock";
            } else {
                editable.contentEditable = "false";
                box.classList.add('locked');
                btn.textContent = "Unlock";
            }
        }

        function toggleKdo(labelBtn) {
            labelBtn.textContent = labelBtn.textContent === 'KDO' ? 'KZO' : 'KDO';
        }

        function adjustFontFamily() {
            const font = document.getElementById('fontFamily').value;
            document.querySelectorAll('.editable').forEach(div => {
                div.style.fontFamily = font;
            });
        }

        function alignText(direction) {
            document.querySelectorAll('.editable').forEach(div => {
                div.style.textAlign = direction;
            });
        }

        function applyBold() {
            document.execCommand('bold');
        }

        function adjustFontSize(change) {
            document.querySelectorAll('.editable').forEach(div => {
                const currentSize = parseInt(window.getComputedStyle(div).fontSize);
                let newSize = currentSize + change;
                if (newSize >= 16 && newSize <= 116) {
                    div.style.fontSize = newSize + 'px';
                }
            });
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const pageSize = document.getElementById('pageSize').value.toLowerCase();
            const doc = new jsPDF({ format: pageSize });
            const boxes = document.querySelectorAll('.editable');

            let colWidth = 180;
            let maxHeight = 270;
            let qrSize = 35;
            let qrX = 160;

            if (pageSize === 'a5') {
                colWidth = 100;
                maxHeight = 190;
                qrSize = 30;
                qrX = 110;
            } else if (pageSize === 'a6') {
                colWidth = 65;
                maxHeight = 130;
                qrSize = 25;
                qrX = 75;
            }

            const x = 10;
            let y = 10;

            for (let i = 0; i < boxes.length; i++) {
                const box = boxes[i];
                const text = box.innerText.trim();

                if (text) {
                    // Extract structured data
                    const phoneMatch = text.match(/\\b\\d{10}\\b/);
                    const pincodeMatch = text.match(/\\b\\d{6}\\b/);
                    const linesText = text.split('\\n').filter(l => l.trim() !== '');
                    const name = linesText.length > 0 ? linesText[0] : '';

                    const qrData = {
                        name: name,
                        phone: phoneMatch ? phoneMatch[0] : '',
                        pincode: pincodeMatch ? pincodeMatch[0] : '',
                        address: text
                    };

                    // Generate QR Code
                    let qrDiv = document.createElement('div');
                    new QRCode(qrDiv, {
                        text: JSON.stringify(qrData),
                        width: 512,
                        height: 512,
                        correctLevel: QRCode.CorrectLevel.L
                    });

                    // Wait slightly for QR code canvas to be rendered
                    await new Promise(r => setTimeout(r, 50));

                    let canvas = qrDiv.querySelector('canvas');
                    let qrDataUrl = canvas ? canvas.toDataURL('image/png') : null;

                    const lines = doc.splitTextToSize(text, colWidth);
                    let textHeight = lines.length * 6; // approximate text block height
                    let blockHeight = Math.max(textHeight, qrSize) + 15;

                    if (y + blockHeight > maxHeight && y !== 10) {
                        doc.addPage();
                        y = 10;
                    }

                    doc.text(lines, x, y + 5);
                    if (qrDataUrl) {
                        doc.addImage(qrDataUrl, 'PNG', qrX, y, qrSize, qrSize);
                    }

                    y += blockHeight;
                }
            }

            doc.save('custom.pdf');
        }


        function printAddresses() {

            const boxes = document.querySelectorAll('.textarea-box');
            const fontFamily = document.getElementById('fontFamily').value;
            const pageSize = document.getElementById('pageSize').value;

            const win = window.open('', '', 'width=800,height=900');
            win.document.write(`
      <html>
      <head>
        <title>Print ${pageSize}</title>
        <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
        <style>
          @page {
            size: ${pageSize} portrait;
            margin: 10mm;
          }
          body {
            font-family: ${fontFamily};
            margin: 0;
            padding: 0;
          }
          .page {
            width: 100%;
            height: 100%;
            page-break-after: always;
            box-sizing: border-box;
            padding: 20px;
            position: relative;
          }
          .page:last-child {
            page-break-after: auto;
          }
          .label {
            position: absolute;
            top: 5px;
            right: 10px;
            font-family: 'Dancing Script', cursive;
            font-size: 16px;
          }
          .content {
            width: 100%;
            font-size: 16px;
            word-wrap: break-word;
            padding: 10px;
            border-radius: 0;
            background: transparent;
          }
          .note {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
          }

        </style>
      </head>
      <body>
    `);

            boxes.forEach((box) => {
                const editable = box.querySelector('.editable');
                const labelBtn = box.querySelector('.kdo-label');

                const label = labelBtn ? labelBtn.textContent : '';
                const plainText = editable.innerText.trim();
                const htmlContent = editable.innerHTML.trim();
                const size = window.getComputedStyle(editable).fontSize;
                const align = window.getComputedStyle(editable).textAlign;

                if (plainText) {
                    // Extract structured data for QR
                    const phoneMatch = plainText.match(/\\b\\d{10}\\b/);
                    const pincodeMatch = plainText.match(/\\b\\d{6}\\b/);
                    const linesText = plainText.split('\\n').filter(l => l.trim() !== '');
                    const name = linesText.length > 0 ? linesText[0] : '';

                    const qrData = {
                        name: name,
                        phone: phoneMatch ? phoneMatch[0] : '',
                        pincode: pincodeMatch ? pincodeMatch[0] : '',
                        address: plainText
                    };

                    // Generate QR
                    let qrDiv = document.createElement('div');
                    new QRCode(qrDiv, {
                        text: JSON.stringify(qrData),
                        width: 512,
                        height: 512,
                        correctLevel: QRCode.CorrectLevel.L
                    });
                    let canvas = qrDiv.querySelector('canvas');
                    let qrDataUrl = canvas ? canvas.toDataURL('image/png') : '';

                    win.document.write(`
            <div class="page">
              <div class="label">${label}</div>
              <div style="display: flex; justify-content: space-between; align-items: flex-start; height: 100%; padding-top: 30px;">
                  <div class="content" style="flex: 1; font-size:${size}; text-align:${align}">${htmlContent}</div>
                  ${qrDataUrl ? `<div style="margin-left: 15px;"><img src="${qrDataUrl}" width="100" height="100" /></div>` : ''}
              </div>
              <div class="note"><em>⚠️Important : Unboxing video required for any claim.</em></div>
            </div>
          `);
                }
            });

            win.document.write(`</body></html>`);
            win.document.close();
            win.print();
        }

        // Start with one box
        addAddressBox();
    </script>
</body>

</html>
